[[redirects]]
  from = "/*.htm"
  to = "/"
  status = 301
  force = true

# Redirect .html URLs to clean canonical paths
[[redirects]]
  from = "/*.html"
  to = "/:splat/"
  status = 301
  force = true

[build.environment]
  NODE_VERSION = "18"

# Enable asset optimization
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true
