# Netlify configuration file

[build]
  # Build from the Next.js app and publish the static export
  base = "web"
  publish = "out"
  command = "npm install && npm run build"
  # Netlify will use /404.html from the publish directory automatically

# Redirects and headers

# --- Legacy site directories (pre-2025 content → homepage) ---
[[redirects]]
  from = "/diesel/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/diesel"
  to = "/"
  status = 301
  force = true

