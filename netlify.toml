# --- Lowercase /information/ → canonical /Information/ ---
[[redirects]]
  from = "/information/*"
  to = "/Information/:splat"
  status = 301
  force = true

# --- Information pages at wrong path ---
[[redirects]]
  from = "/montana-facts"
