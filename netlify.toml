# --- Town page .html extensions and typos ---
[[redirects]]
  from = "/montana-towns/west-glacier.html"
  to = "/montana-towns/west-glacier/"
  status = 301
  force = true

[[redirects]]
  from = "/montana-towns/gardiner.html"
  to = "/montana-towns/gardiner/"
  status = 301
  force = true

[[redirects]]
  from = "/montana-towns/polan.html"
  to = "/montana-towns/polson/"
  status = 301
  force = true

[[redirects]]
  from = "/montana-towns/seeley-lake.html"
  to = "/montana-towns/seeley-lake/"
  status = 301
  force = true

# --- Catch-all: any remaining .htm files ---
[[redirects]]
  from = "/*.htm"
  to = "/"
  status = 301
  force = true

# Redirect .html URLs to clean canonical paths
[[redirects]]
  from = "/*.html"
  to = "/:splat/"
  status = 301
  force = true

[build.environment]
  NODE_VERSION = "18"

# Enable asset optimization
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true
